name: CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: lms_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3', extensions: pdo_pgsql }
      - name: Install deps
        working-directory: backend
        run: composer install --no-interaction --prefer-dist
      - name: Apply schema
        run: |
          for f in database/migrations/*.sql; do
            PGPASSWORD=postgres psql -h localhost -U postgres -d lms_test -f "$f" || true
          done
      - name: Run tests
        working-directory: backend
        run: ./vendor/bin/phpunit
      - name: Lint
        working-directory: backend
        run: ./vendor/bin/pint --test || true
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Build
        working-directory: frontend
        run: npm install && npm run build
